line-length = 100
target-version = "py311"
exclude = ["data/email_alerts.py"]

[lint]
select = ["E", "W", "F", "I", "UP"]
ignore = [
    "E501",   # line too long
    "E402",   # module-level import not at top
    "E701",   # multiple statements on one line (colon) — common in existing code
    "E702",   # multiple statements on one line (semicolon)
    "F401",   # unused import
    "F821",   # undefined name — existing bugs, tracked separately
    "F841",   # local variable assigned but never used
    "UP007",  # Use X | Y for type hints — requires Python 3.10+
]

[lint.per-file-ignores]
"tests/*" = ["E501"]
"data/email_alerts.py" = ["E501"]  # contains long f-strings


[format]
quote-style = "double"
indent-style = "space"
