[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, UP = pyupgrade (basic)
# Deliberately NOT enabling flake8-bugbear (B) or pep8-naming (N) yet
# to avoid hundreds of warnings on day one.
select = ["E", "W", "F", "I", "UP"]
ignore = [
    "E501",   # line too long — ruff formatter handles this
    "E402",   # module-level import not at top (Flask apps often have late imports)
    "F401",   # unused import — too many false positives in __init__ / web.py
    "UP007",  # Use X | Y for type hints — requires Python 3.10+
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
