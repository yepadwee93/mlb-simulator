services:
  - type: web
    name: mlb-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ODDS_API_KEY
        sync: false   # you'll paste this in the Render dashboard — never commit it
    plan: free
