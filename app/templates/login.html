<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MLB Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e8eaf0; font-family: 'Segoe UI', Arial, sans-serif;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #161923; border: 1px solid #252836; border-radius: 20px; padding: 40px 36px;
            width: 100%; max-width: 400px; }
    .logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .sub { text-align: center; color: #8890a4; font-size: 0.85rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.72rem; color: #8890a4; text-transform: uppercase;
            letter-spacing: .4px; margin-bottom: 6px; }
    input { width: 100%; background: #0f1117; border: 1px solid #333650; border-radius: 10px;
            color: #e8eaf0; padding: 11px 14px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #64b5f6; }
    .btn { width: 100%; background: linear-gradient(135deg, #1565c0, #0d47a1);
           color: #fff; border: none; border-radius: 10px; padding: 13px;
           font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: linear-gradient(135deg, #1976d2, #1565c0); }
    .error { background: #3a1a1a; border: 1px solid #ef5350; border-radius: 8px;
             padding: 10px 14px; color: #ef9a9a; font-size: 0.85rem; margin-bottom: 16px; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #8890a4; }
    .footer a { color: #64b5f6; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚾</div>
  <h1>MLB Simulator</h1>
  <p class="sub">Sign in to your account</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>

  <div class="footer">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
</body>
</html>
