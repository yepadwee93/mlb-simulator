<!DOCTYPE html>
<html lang="en">
<head>
<script>!function(){var t=localStorage.getItem("mlb_theme")||"dark",m={dark:{"--bg":"#141010","--bg2":"#1a1212","--bg3":"#241818","--border":"#2a1a1a","--text":"#f0ece4","--text2":"#999","--text3":"#777","--accent":"#e53935","--card-bg":"#1a1212"},medium:{"--bg":"#1c1614","--bg2":"#262020","--bg3":"#302624","--border":"#3a2e2c","--text":"#f0ece4","--text2":"#c0b0a8","--text3":"#998880","--accent":"#ffc107","--card-bg":"#262020"},light:{"--bg":"#f5f0e8","--bg2":"#faf7f2","--bg3":"#ebe4d8","--border":"#d8cfc0","--text":"#2a1a14","--text2":"#5a4a40","--text3":"#8a7a6a","--accent":"#c62828","--card-bg":"#faf7f2"}}[t]||{};Object.entries(m).forEach(function(e){document.documentElement.style.setProperty(e[0],e[1])});document.addEventListener("DOMContentLoaded",function(){document.body.style.background=m["--bg"];document.body.style.color=m["--text"]})}();</script>
  <meta charset="UTF-8">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MLB Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px;
            width: 100%; max-width: 400px; }
    .logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .sub { text-align: center; color: var(--text2); font-size: 0.85rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.72rem; color: var(--text2); text-transform: uppercase;
            letter-spacing: .4px; margin-bottom: 6px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); padding: 11px 14px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #e53935; }
    .btn { width: 100%; background: linear-gradient(135deg, #c62828, #0d47a1);
           color: var(--text); border: none; border-radius: 10px; padding: 13px;
           font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: linear-gradient(135deg, #1976d2, #c62828); }
    .error { background: #3a1a1a; border: 1px solid #ef5350; border-radius: 8px;
             padding: 10px 14px; color: #ef9a9a; font-size: 0.85rem; margin-bottom: 16px; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text2); }
    .footer a { color: #e53935; }
  </style>

<body>
<div class="card">
  <div class="logo">⚾</div>

<!-- ── Live Scoreboard Bar ── -->
<div id="scoreboard-bar" style="background:var(--bg);border-bottom: 1px solid var(--border);padding:0;overflow:hidden;">
  <div id="scoreboard-inner" style="display:flex;overflow-x:auto;gap:0;scrollbar-width:none;-ms-overflow-style:none;">
    <div style="padding:7px 14px;font-size:0.7rem;color:var(--text3);white-space:nowrap;align-self:center;flex-shrink:0;">TODAY</div>
  </div>
</div>
<script>
(function(){
  function abbr(name) {
    var w = name.split(' ');
    return w[w.length-1].substring(0,3).toUpperCase();
  }
  function statusColor(s) {
    s = (s||'').toLowerCase();
    if (s.includes('progress')||s.includes('live')) return '#ef5350';
    if (s.includes('final')) return '#4caf50';
    return '#777';
  }
  function renderScoreboard(games) {
    var inner = document.getElementById('scoreboard-inner');
    if (!inner) return;
    if (!games.length) { document.getElementById('scoreboard-bar').style.display='none'; return; }
    var html = '<div style="padding:7px 14px;font-size:0.7rem;color:var(--text3);white-space:nowrap;align-self:center;flex-shrink:0;">TODAY</div>';
    games.forEach(function(g) {
      var s = (g.status||'').toLowerCase();
      var isLive = s.includes('progress')||s.includes('live');
      var isFinal = s.includes('final');
      var timeStr = '';
      if (!isLive && !isFinal && g.game_time) {
        try { timeStr = new Date(g.game_time).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); } catch(e){}
      } else if (isLive) {
        timeStr = (g.inning_half==='top'?'▲':'▼') + (g.inning||'');
      } else if (isFinal) {
        timeStr = 'Final';
      }
      var scoreAway = (isLive||isFinal) ? '<b style="color:var(--text);">'+esc(g.away_score)+'</b>' : '';
      var scoreHome = (isLive||isFinal) ? '<b style="color:var(--text);">'+esc(g.home_score)+'</b>' : '';
      var dot = '<span style="width:6px;height:6px;border-radius:50%;background:'+statusColor(g.status)+';display:inline-block;margin-right:5px;vertical-align:middle;'+(isLive?'animation:pulse 1.2s infinite;':'')+'" ></span>';
      var link = g.gamePk ? '/simulate/'+g.gamePk+'?sims=100000' : '#';
      html += '<a href="'+link+'" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 14px;border-left:1px solid var(--border);text-decoration:none;flex-shrink:0;min-width:110px;">'
        + '<div style="display:flex;align-items:center;gap:6px;font-size:0.72rem;white-space:nowrap;">'
        + '<span style="color: var(--text2);">'+esc(abbr(g.away))+' '+scoreAway+'</span>'
        + '<span style="color:var(--text3);font-size:0.65rem;">@</span>'
        + '<span style="color: var(--text2);">'+scoreHome+' '+esc(abbr(g.home))+'</span>'
        + '</div>'
        + '<div style="font-size:0.63rem;margin-top:2px;">'+dot+'<span style="color:'+statusColor(g.status)+';">'+timeStr+'</span></div>'
        + '</a>';
    });
    inner.innerHTML = html;
  }
  csrfFetch('/api/scores').then(function(r){return r.json();}).then(renderScoreboard).catch(function(){
    document.getElementById('scoreboard-bar').style.display='none';
  });
})();
</script>
<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
#scoreboard-inner::-webkit-scrollbar { display:none; }
</style>
  <h1>MLB Simulator</h1>
  <p class="sub">Sign in to your account</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>

  <div class="footer">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
<script>
function getCsrfToken(){return document.cookie.split(';').map(function(c){return c.trim();}).find(function(c){return c.startsWith('csrf_token=');})?.split('=')[1]||'';}
function csrfFetch(url,opts){opts=opts||{};opts.headers=Object.assign({'X-CSRFToken':getCsrfToken()},opts.headers||{});return fetch(url,opts);}
</script></body>
</html>
