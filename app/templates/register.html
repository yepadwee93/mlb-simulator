<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — MLB Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e8eaf0; font-family: 'Segoe UI', Arial, sans-serif;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #161923; border: 1px solid #252836; border-radius: 20px; padding: 40px 36px;
            width: 100%; max-width: 400px; }
    .logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    h1 { text-align: center; font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .sub { text-align: center; color: #8890a4; font-size: 0.85rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.72rem; color: #8890a4; text-transform: uppercase;
            letter-spacing: .4px; margin-bottom: 6px; }
    input { width: 100%; background: #0f1117; border: 1px solid #333650; border-radius: 10px;
            color: #e8eaf0; padding: 11px 14px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #64b5f6; }
    .hint { font-size: 0.72rem; color: #555870; margin-top: 4px; }
    .btn { width: 100%; background: linear-gradient(135deg, #2e7d32, #1b5e20);
           color: #fff; border: none; border-radius: 10px; padding: 13px;
           font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: linear-gradient(135deg, #388e3c, #2e7d32); }
    .error { background: #3a1a1a; border: 1px solid #ef5350; border-radius: 8px;
             padding: 10px 14px; color: #ef9a9a; font-size: 0.85rem; margin-bottom: 16px; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #8890a4; }
    .footer a { color: #64b5f6; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚾</div>
  <h1>Create Account</h1>
  <p class="sub">Free to join — your picks stay yours</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required minlength="3">
      <div class="hint">At least 3 characters. Can't be changed later.</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" id="pw" autocomplete="new-password" required minlength="8">
      <div class="hint">8+ characters · at least one capital letter · at least one number</div>
      <div id="pw-checks" style="margin-top:8px;font-size:0.72rem;display:none;">
        <div id="chk-len"  style="color:#555870;">✗ At least 8 characters</div>
        <div id="chk-cap"  style="color:#555870;">✗ One capital letter</div>
        <div id="chk-num"  style="color:#555870;">✗ One number</div>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm" id="confirm" autocomplete="new-password" required>
      <div id="match-msg" style="font-size:0.72rem;margin-top:4px;display:none;"></div>
    </div>
    <button class="btn" type="submit">Create Account</button>
    <script>
      const pw = document.getElementById('pw');
      const confirm = document.getElementById('confirm');
      const checks = document.getElementById('pw-checks');
      const chkLen = document.getElementById('chk-len');
      const chkCap = document.getElementById('chk-cap');
      const chkNum = document.getElementById('chk-num');
      const matchMsg = document.getElementById('match-msg');

      function mark(el, ok) {
        el.textContent = (ok ? '✓' : '✗') + el.textContent.slice(1);
        el.style.color = ok ? '#4caf50' : '#555870';
      }

      pw.addEventListener('input', () => {
        const v = pw.value;
        checks.style.display = 'block';
        mark(chkLen, v.length >= 8);
        mark(chkCap, /[A-Z]/.test(v));
        mark(chkNum, /[0-9]/.test(v));
        checkMatch();
      });

      confirm.addEventListener('input', checkMatch);

      function checkMatch() {
        if (!confirm.value) { matchMsg.style.display = 'none'; return; }
        matchMsg.style.display = 'block';
        if (pw.value === confirm.value) {
          matchMsg.textContent = '✓ Passwords match';
          matchMsg.style.color = '#4caf50';
        } else {
          matchMsg.textContent = '✗ Passwords don\'t match';
          matchMsg.style.color = '#ef5350';
        }
      }
    </script>
  </form>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>
</body>
</html>
